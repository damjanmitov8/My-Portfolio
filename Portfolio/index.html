<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Portfolio</title>
  </head>
  <body>
    <header class="sticky-top">
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-5">
        <a class="navbar-brand fs-3" href="#home">Portfolio</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link text-light mx-3" href="#home">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-light mx-3" href="#about">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-light mx-3" href="#skills">Skills</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-light mx-3" href="#projects">My Projects</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-light mx-3" href="#contact">Contact</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <section id="home" class="vh-100 bg-dark">
        <div class="container">
          <div class="row d-flex align-items-center lead">
            <div class="col-md-6">
              <h3>Hello!</h3>
              <h1 id="name"></h1>
              <p id="bio"></p>
              <a href="#contact" class="btn btn-danger mt-3" id="btnHire"
                >Hire Me</a
              >
            </div>
            <div class="col-md-6">
              <img
                class="img-fluid"
                src="./images/C0D4EDE3-FF12-4017-AA3E-A2FE4FC927D4.png"
                alt="My profile picture"
              />
            </div>
          </div>
        </div>
      </section>

      <section id="about">
        <div class="container">
          <div class="row">
            <div class="col-md-6">
              <img
                class="img-fluid"
                src="./images/critical-thinking-1080x720px.jpg"
                alt="Thinking"
              />
            </div>
            <div class="col-12 col-md-6 col-lg-4">
              <h1 id="about-header"></h1>
              <p id="about-bio"></p>
              <p id="about-name"></p>
              <p id="about-age"></p>
              <p id="about-address"></p>
              <p id="about-phone"></p>
              <p id="about-email"></p>
            </div>
          </div>
        </div>
      </section>

      <section id="skills">
        <div class="container ">
          <h2 class="text-center mb-5">MY <span>SKILLS</span></h2>
          <div class="row">
            <div class="col-md-6 mb-4">
              <h5 id="html"></h5>
              <div class="progress" style="height: 10px">
                <div
                  class="progress-bar bg-primary"
                  role="progressbar"
                  style="width: 90%"
                  aria-valuenow="90"
                  aria-valuemin="0"
                  aria-valuemax="100"
                ></div>
              </div>
              <small class="text-muted">90% Complete</small>
            </div>
            <div class="col-md-6 mb-4">
              <h5 id="javascript"></h5>
              <div class="progress" style="height: 10px">
                <div
                  class="progress-bar bg-success"
                  role="progressbar"
                  style="width: 75%"
                  aria-valuenow="75"
                  aria-valuemin="0"
                  aria-valuemax="100"
                ></div>
              </div>
              <small class="text-muted">75% Complete</small>
            </div>
            <div class="col-md-6 mb-4">
              <h5 id="css"></h5>
              <div class="progress" style="height: 10px">
                <div
                  class="progress-bar bg-info"
                  role="progressbar"
                  style="width: 80%"
                  aria-valuenow="80"
                  aria-valuemin="0"
                  aria-valuemax="100"
                ></div>
              </div>
              <small class="text-muted">70% Complete</small>
            </div>
            <div class="col-md-6 mb-4">
              <h5 id="git"></h5>
              <div class="progress" style="height: 10px">
                <div
                  class="progress-bar bg-warning"
                  role="progressbar"
                  style="width: 85%"
                  aria-valuenow="85"
                  aria-valuemin="0"
                  aria-valuemax="100"
                ></div>
              </div>
              <small class="text-muted">75% Complete</small>
            </div>
          </div>
        </div>
      </section>

      <section id="projects">
        <h2 class="text-center">MY <span>PROJECTS</span></h2>
        <div class="container-projects">

          <div class="project-card">
            <img src="./images/Rock-paper-scissors.svg.png" alt="project" />
            <div class="overlay">
              <h3 id="title-rock"></h3>
              <p id="desc-rock"></p>
            </div>
          </div>

          <div class="project-card">
            <img
              src="./images/Screenshot 2026-03-10 192056.png"
              alt="project"
            />
            <div class="overlay">
              <h3 id="title-country"></h3>
              <p id="desc-country"></p>
            </div>
          </div>
          <div class="project-card">
            <img src="./images/ecommerce12.jpg" alt="project" />
            <div class="overlay">
              <h3 id="title-ecommerce"></h3>
              <p id="desc-ecommerce"></p>
            </div>
          </div>
        </div>
      </section>

      <section id="contact">
        <div class="container">
          <h2 class="text-center mb-4">CONTACT <span>ME</span></h2>

          <form>
        
            <div class="row g-3 mb-3">
              <div class="col-md-4">
                <input type="text" class="form-control" placeholder="Name" />
              </div>

              <div class="col-md-4">
                <input
                  type="email"
                  class="form-control"
                  placeholder="Email address"
                />
              </div>

              <div class="col-md-4">
                <input type="text" class="form-control" placeholder="Subject" />
              </div>
            </div>

         
            <div class="mb-3">
              <textarea
                class="form-control"
                placeholder="Leave a comment here"
                rows="5"
              ></textarea>
            </div>

          
            <button type="submit" class="btn btn-danger mt-3" id="btnContact">Send</button>
          </form>
        </div>
      </section>
    </main>

    <footer>CopyRight © 2024 Damjan Mitov | All Rights Reserved</footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
